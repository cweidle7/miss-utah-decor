  html, body { margin: 0; padding: 0; background: #fff; }

    50% { transform: scale(1.4); opacity: .6; }
  }
  ::selection { background: var(--pink-200); color: var(--ink); }

  /* Prevent padding from expanding elements past their explicit width */
  *, *::before, *::after { box-sizing: border-box; }

  @media (max-width: 640px) {
    /* Header: flatten to flex, hide nav and phone to keep only logo + CTA button */
    header > div {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
    }
    header nav { display: none !important; }
    header > div > div:last-child > a { display: none !important; }

    /* Contact section: stack the two-column info + form layout vertically */
    #contact > div { grid-template-columns: 1fr !important; }

    /* Form card: collapse two-column field grid to single column */
    #contact form { grid-template-columns: 1fr !important; }
  }

  /* Grid cells must be able to shrink below content-width — prevents inputs from escaping their column */
  #contact form > div { min-width: 0; }
  input, textarea, select { max-width: 100%; }

<script type="text/babel" data-src-loc="1446:1472:2563" data-plugins="transform-react-jsx-source,om-src-id" data-filename="inline-3">
const { useState, useEffect } = React;

function App() {
  const [current, setCurrent] = useState('home');

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  const onNav = (key) => {
    setCurrent(key);
    if (key === 'home')        window.scrollTo({ top: 0, behavior: 'smooth' });
    else if (key === 'contact') scrollTo('contact');
    else                        scrollTo(key);
  };
  window.MUD_nav = onNav;

  const toContact = () => onNav('contact');

  return (
    <div data-screen-label="01 Home">
      <Header current={current} onNav={onNav} overlay={true} />
      <Hero onCTA={toContact} />
      <TrustStrip />
      <PinkBand />
      <CategoryGrid onPick={toContact} />
      <Packages onCTA={toContact} />
      <Testimonials />
      <WeMakeIt onCTA={toContact} />
      <InstagramGrid />
      <ContactBlock />
      <Footer />
      <StickyCTA onClick={toContact} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
